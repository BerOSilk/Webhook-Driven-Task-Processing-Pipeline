version: '3.8'

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webhook"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_URL: postgresql://postgres:postgres@db:5432/webhook
      PORT: 3000
      INTERVAL_MS: 1000
      MAX_ATTEMPTS: 5
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run generate && npm run migrate && npm run dev"